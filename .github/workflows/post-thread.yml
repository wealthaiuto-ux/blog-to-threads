name: Post Approved Thread

# 【2026-07-21 停止中】REDESIGN.md v3 の P2（計測）・P3（月次レビュー）が入るまで止める。
# 再開するときは下の schedule のコメントを外すだけでよい（1日2本・朝8時と夜21時）。
# 1回の実行で approved の最古を1本投稿するので、cron 2枠 = 1日2本。
#
# 投稿時刻は一般論のベストプラクティスに合わせる（Threadsで伸びやすいのは
# 通勤・昼休み・帰宅後の可処分時間で、夜が最強）。朝8時（通勤）＋夜21時（ピーク）。
# ※自前の実測(n=37)は偶然の範囲なので採用しない。承認は前夜にまとめて2本。
on:
  # schedule:
  #   - cron: "0 23 * * *"   # JST 08:00
  #   - cron: "0 12 * * *"   # JST 21:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true にすると投稿せず、選ばれるドラフトの中身だけ表示する"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post oldest approved draft
        id: post
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/run_post.py --dry-run
          else
            python scripts/run_post.py
          fi

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_log.json || true
          git diff --cached --quiet || git commit -m "log: posted $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true

      # 在庫切れ（approved=0）は例外ではないので success で通ってしまう。
      # 「静かに止まっている」状態なので Issue で知らせる。同じ Issue が開いていれば作らない。
      - name: Notify on empty stock
        if: steps.post.outputs.stock_out == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --state open --label stock-out --limit 1 --json number --jq 'length')
          if [ "$existing" != "0" ]; then
            echo "既に在庫切れIssueが開いているので作らない"
            exit 0
          fi
          gh label create stock-out --color FBCA04 --description "承認済みドラフトの在庫切れ" 2>/dev/null || true
          body=$(printf '投稿しようとしましたが、status=approved のドラフトが0件でした。\n\n実行ログ: %s\n\nNotion のドラフトDBを開いて、生成済みドラフトを approved にしてください。\nドラフト自体が無い場合は Actions から `Generate Threads Drafts` を手動実行してください。\n' "$RUN_URL")
          gh issue create --label stock-out \
            --title "⚠️ 承認済みドラフトの在庫が切れています" \
            --body "$body"

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          body=$(printf '投稿ジョブが失敗しました。\n\n実行ログ: %s\n' "$RUN_URL")
          gh issue create \
            --title "🚨 Threads投稿が失敗しました ($(date -u +%Y-%m-%d))" \
            --body "$body"
