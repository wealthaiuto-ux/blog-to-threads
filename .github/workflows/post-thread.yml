name: Post Approved Thread

# 朝7:00 / 昼11:00 / 夜20:00 JST
# 対応UTC: 22:00 / 02:00 / 11:00（前日UTC夜含む）
on:
  schedule:
    - cron: "0 22 * * *"   # JST 07:00
    - cron: "0 2 * * *"    # JST 11:00
    - cron: "0 11 * * *"   # JST 20:00
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post oldest approved draft
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python scripts/run_post.py

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_log.json || true
          git diff --cached --quiet || git commit -m "log: posted $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
