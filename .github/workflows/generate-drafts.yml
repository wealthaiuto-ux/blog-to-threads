name: Generate Threads Drafts

# 毎日 21:03 JST (= 12:03 UTC) に3本分のドラフトを生成 → Notion保存
# UTC ぴったり時刻は混雑で遅延しやすいので 3分ずらしている
# 翌日の朝/昼/夜の投稿スロット分をまとめて作る
on:
  schedule:
    - cron: "3 12 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "生成するドラフト数"
        required: false
        default: "3"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DRAFT_COUNT: ${{ github.event.inputs.count || '3' }}
        run: |
          python scripts/run_generate.py --count "$DRAFT_COUNT"

      - name: Commit cache & generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles_cache.json data/generated_log.json data/generated/ || true
          git diff --cached --quiet || git commit -m "drafts: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true

      # 生成がこけると approved 在庫が尽き、投稿ジョブは success のまま無言でスキップする。
      # 静かに止まるのを防ぐため、失敗時は必ず Issue を立てて通知する。
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          body=$(printf '生成ジョブが失敗しました。今夜のドラフトは0件です。\n\n実行ログ: %s\n\n放置すると approved 在庫が尽きて、投稿ジョブが success のまま無言でスキップし始めます。\n復旧するには Actions から `Generate Threads Drafts` を count=1 で手動実行してください。\n' "$RUN_URL")
          gh issue create \
            --title "🚨 ドラフト生成が失敗しました ($(date -u +%Y-%m-%d))" \
            --body "$body"
