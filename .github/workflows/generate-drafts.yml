name: Generate Threads Drafts

# 毎日 22:00 JST (= 13:00 UTC) に3本分のドラフトを生成 → Notion保存
# 翌日の朝/昼/夜の投稿スロット分をまとめて作る
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "生成するドラフト数"
        required: false
        default: "3"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python scripts/run_generate.py --count "${{ github.event.inputs.count || '3' }}"

      - name: Commit cache & generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles_cache.json data/generated/ || true
          git diff --cached --quiet || git commit -m "drafts: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
